<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <defs>
    <radialGradient id="pcScale" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c08755"/>
      <stop offset="55%" stop-color="#8a5326"/>
      <stop offset="100%" stop-color="#4a2a10"/>
    </radialGradient>
    <linearGradient id="pcStem" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#2a1d10"/>
    </linearGradient>
  </defs>
  <!-- stem -->
  <rect x="38.5" y="4" width="3" height="9" rx="1.5" fill="url(#pcStem)"/>
  <!-- scales arranged in offset rows, top → bottom, narrowing into teardrop -->
  <!-- row 1 (top) -->
  <ellipse cx="40" cy="16" rx="6" ry="5" fill="url(#pcScale)"/>
  <!-- row 2 -->
  <ellipse cx="32" cy="22" rx="7" ry="5.5" fill="url(#pcScale)"/>
  <ellipse cx="48" cy="22" rx="7" ry="5.5" fill="url(#pcScale)"/>
  <!-- row 3 -->
  <ellipse cx="26" cy="30" rx="8" ry="6" fill="url(#pcScale)"/>
  <ellipse cx="40" cy="30" rx="8" ry="6" fill="url(#pcScale)"/>
  <ellipse cx="54" cy="30" rx="8" ry="6" fill="url(#pcScale)"/>
  <!-- row 4 -->
  <ellipse cx="22" cy="40" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="34" cy="40" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="46" cy="40" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="58" cy="40" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <!-- row 5 -->
  <ellipse cx="20" cy="51" rx="9" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="32" cy="51" rx="9" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="44" cy="51" rx="9" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="56" cy="51" rx="9" ry="6.5" fill="url(#pcScale)"/>
  <!-- row 6 -->
  <ellipse cx="23" cy="62" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="35" cy="62" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="47" cy="62" rx="8.5" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="58" cy="62" rx="8" ry="6" fill="url(#pcScale)"/>
  <!-- row 7 (narrowing) -->
  <ellipse cx="27" cy="73" rx="7.5" ry="6" fill="url(#pcScale)"/>
  <ellipse cx="40" cy="73" rx="8" ry="6.5" fill="url(#pcScale)"/>
  <ellipse cx="53" cy="73" rx="7.5" ry="6" fill="url(#pcScale)"/>
  <!-- row 8 -->
  <ellipse cx="32" cy="83" rx="7" ry="5.5" fill="url(#pcScale)"/>
  <ellipse cx="46" cy="83" rx="7" ry="5.5" fill="url(#pcScale)"/>
  <!-- row 9 (tip) -->
  <ellipse cx="39" cy="92" rx="6.5" ry="5" fill="url(#pcScale)"/>
</svg>
